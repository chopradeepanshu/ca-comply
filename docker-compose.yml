services:

  # ── PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ca_comply_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ca_comply
      POSTGRES_USER: ca_comply_user
      POSTGRES_PASSWORD: Ca_Comply_Secure_Pass_2024!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ca_comply_user -d ca_comply"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ca_comply_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://ca_comply_user:Ca_Comply_Secure_Pass_2024!@postgres:5432/ca_comply
      JWT_SECRET: ca_comply_jwt_secret_super_secure_key_2024_production
      JWT_REFRESH_SECRET: ca_comply_refresh_jwt_secret_secure_key_2024_prod
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Frontend + Nginx
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ca_comply_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  default:
    name: ca_comply_network
