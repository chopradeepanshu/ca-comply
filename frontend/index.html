<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Comply</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0f1117;--surface:#1a1f2e;--surface2:#212736;--border:#2a3142;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--accent-dim:rgba(59,130,246,0.12);--green:#10b981;--green-dim:rgba(16,185,129,0.12);--red:#ef4444;--red-dim:rgba(239,68,68,0.12);--yellow:#f59e0b;--yellow-dim:rgba(245,158,11,0.12);--purple:#8b5cf6;--sidebar:220px;}
:root[data-theme="light"]{--bg:#f0f4f8;--surface:#ffffff;--surface2:#e8edf2;--border:#cbd5e1;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--accent:#2563eb;--accent-dim:rgba(37,99,235,0.10);--green:#059669;--green-dim:rgba(5,150,105,0.10);--red:#dc2626;--red-dim:rgba(220,38,38,0.10);--yellow:#d97706;--yellow-dim:rgba(217,119,6,0.10);--purple:#7c3aed;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
/* Layout */
#app{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .2s;}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;}
.content{padding:24px;flex:1;max-width:1400px;width:100%;}
/* Sidebar */
.sidebar-brand{padding:20px 16px;border-bottom:1px solid var(--border);}
.brand-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.brand-tier{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--yellow-dim);color:var(--yellow);font-weight:600;margin-top:2px;display:inline-block;}
.nav{padding:12px 8px;flex:1;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:2px;transition:all .15s;text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);}
.user-card{display:flex;align-items:center;gap:10px;padding:8px;border-radius:7px;cursor:pointer;}
.user-card:hover{background:var(--surface2);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.user-info .name{font-size:13px;font-weight:600;}
.user-info .role{font-size:11px;color:var(--text3);}
/* Topbar */
.topbar-title{font-size:17px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#2563eb;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--text2);border:1px solid var(--border);cursor:pointer;font-size:16px;}
.btn-icon:hover{color:var(--accent);border-color:var(--accent);}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
.card-sm{padding:14px;}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
.stat-val{font-size:28px;font-weight:700;line-height:1;}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px;}
.stat-card.red{border-color:rgba(239,68,68,0.3);}
.stat-card.red .stat-val{color:var(--red);}
.stat-card.yellow{border-color:rgba(245,158,11,0.3);}
.stat-card.yellow .stat-val{color:var(--yellow);}
.stat-card.green{border-color:rgba(16,185,129,0.3);}
.stat-card.green .stat-val{color:var(--green);}
.stat-card.blue{border-color:rgba(59,130,246,0.3);}
.stat-card.blue .stat-val{color:var(--accent);}
/* Tables */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;border-bottom:1px solid var(--border);}
td{padding:12px 14px;border-bottom:1px solid rgba(42,49,66,0.5);font-size:13px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow);}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-blue{background:var(--accent-dim);color:var(--accent);}
.badge-purple{background:rgba(139,92,246,0.12);color:var(--purple);}
.badge-gray{background:rgba(100,116,139,0.12);color:var(--text2);}
.badge-pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* Forms */
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
input,select,textarea{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:80px;}
select option{background:var(--surface2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:780px;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:16px;font-weight:700;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.4);display:flex;align-items:center;gap:10px;min-width:280px;animation:slideIn .2s ease;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-success{border-color:rgba(16,185,129,0.4);}
.toast-error{border-color:rgba(239,68,68,0.4);}
/* Misc */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:20px;font-weight:700;}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.search-box{position:relative;flex:1;min-width:200px;}
.search-box input{padding-left:36px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text3);}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:8px;}
/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:100%;max-width:420px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .big{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:700;}
.login-logo .sub{font-size:13px;color:var(--text3);margin-top:4px;}
.login-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
.login-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;}
.login-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.error-msg{background:var(--red-dim);border:1px solid rgba(239,68,68,0.2);color:var(--red);padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;}
.success-msg{background:var(--green-dim);border:1px solid rgba(16,185,129,0.2);color:var(--green);padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;}
/* Notification panel */
.notif-panel{position:fixed;top:0;right:0;width:360px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:150;transform:translateX(100%);transition:transform .25s;overflow-y:auto;}
.notif-panel.open{transform:translateX(0);}
.notif-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.notif-item:hover{background:var(--surface2);}
.notif-item.unread{border-left:3px solid var(--accent);}
.notif-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.notif-body{font-size:12px;color:var(--text2);}
.notif-time{font-size:11px;color:var(--text3);margin-top:4px;}
/* Chat */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 140px);}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.chat-msg{max-width:75%;}
.chat-msg.user{align-self:flex-end;}
.chat-msg.assistant{align-self:flex-start;}
.chat-bubble{padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.6;}
.chat-msg.user .chat-bubble{background:var(--accent);color:#fff;border-radius:10px 10px 2px 10px;}
.chat-msg.assistant .chat-bubble{background:var(--surface2);color:var(--text);border-radius:10px 10px 10px 2px;}
.chat-input{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px;}
.chat-input input{flex:1;}
/* Charts */
.chart-bar-wrap{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.bar-label{width:120px;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.bar-val{width:40px;color:var(--text2);}
/* Progress ring */
.ring-wrap{display:flex;align-items:center;gap:8px;}
.ring{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--surface2);}
.ring-fg{fill:none;stroke-linecap:round;transition:stroke-dashoffset .5s ease;}
/* Responsive */
@media(max-width:768px){.sidebar{transform:translateX(-100%);}#sidebar-toggle{display:flex!important;}.main{margin-left:0;}.form-row{grid-template-columns:1fr;}}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:.15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
</style>
</head>
<body>
<div id="app"></div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ══════════════════════════════════════════
// CA COMPLY — Full SPA
// ══════════════════════════════════════════

const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:4000/api'
  : '/api';

// ── THEME
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme || 'dark');
}

async function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  if (state.user) {
    if (!state.user.preferences) state.user.preferences = {};
    state.user.preferences.theme = next;
  }
  renderTopbar();
  try {
    await api('PATCH', '/users/me', { theme: next });
  } catch (e) {
    applyTheme(current);
    if (state.user?.preferences) state.user.preferences.theme = current;
    renderTopbar();
    toast('Failed to save theme', 'error');
  }
}

// ── STATE
const state = {
  user: null, token: null, refreshToken: null,
  currentPage: 'dashboard',
  data: {
    stats: null, clients: [], tasks: [], documents: [],
    users: [], notifications: [], workload: [],
    analytics: null, activities: [], errors: [],
    bankData: null, bankSearch: '', bankPage: 0
  },
  loading: false,
  modals: {},
  notifOpen: false,
};

// ── AUTH
async function api(method, path, body, retry = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  try {
    const res = await fetch(API + path, {
      method, headers,
      body: body ? JSON.stringify(body) : undefined
    });
    if (res.status === 401 && retry && state.refreshToken) {
      // Try to refresh token
      const r = await fetch(API + '/auth/refresh', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refreshToken: state.refreshToken })
      });
      if (r.ok) {
        const data = await r.json();
        state.token = data.accessToken;
        state.refreshToken = data.refreshToken;
        localStorage.setItem('ca_token', data.accessToken);
        localStorage.setItem('ca_refresh', data.refreshToken);
        return api(method, path, body, false);
      } else {
        logout();
        return null;
      }
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || data.error || 'Request failed');
    return data;
  } catch (e) {
    throw e;
  }
}

function logout() {
  state.user = null; state.token = null; state.refreshToken = null;
  localStorage.removeItem('ca_token');
  localStorage.removeItem('ca_refresh');
  renderApp();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── ROUTER
function navigate(page) {
  state.currentPage = page;
  renderApp();
  loadPageData(page);
}

async function loadPageData(page) {
  state.loading = true;
  try {
    if (page === 'dashboard') {
      const d = await api('GET', '/dashboard/stats');
      if (d) { state.data.stats = d.stats; state.data.upcoming = d.upcomingDeadlines; state.data.activity = d.recentActivity; }
    } else if (page === 'compliance') {
      const d = await api('GET', '/compliance/tasks?limit=200');
      if (d) state.data.tasks = d.tasks;
    } else if (page === 'clients') {
      const d = await api('GET', '/clients?limit=200');
      if (d) state.data.clients = d.clients;
    } else if (page === 'documents') {
      const d = await api('GET', '/documents');
      if (d) state.data.documents = d.documents;
      const c = await api('GET', '/clients?limit=200');
      if (c) state.data.clients = c.clients;
    } else if (page === 'users') {
      const [u, w] = await Promise.all([api('GET', '/users'), api('GET', '/users/workload')]);
      if (u) state.data.users = u.users;
      if (w) state.data.workload = w.workload;
    } else if (page === 'analytics') {
      const [ov, fu, act, errs] = await Promise.all([
        api('GET', '/analytics/overview'),
        api('GET', '/analytics/feature-usage'),
        api('GET', '/analytics/activity'),
        api('GET', '/analytics/errors'),
      ]);
      state.data.analytics = ov;
      state.data.featureUsage = fu?.usage || [];
      state.data.activities = act?.activities || [];
      state.data.errors = errs?.errors || [];
    } else if (page === 'notifications') {
      const d = await api('GET', '/notifications');
      if (d) state.data.notifications = d.notifications;
    } else if (page === 'bank_analysis') {
      if (!state.data.clients.length) {
        const d = await api('GET', '/clients?limit=500');
        if (d) state.data.clients = d.clients;
      }
    }
  } catch (e) {
    toast(e.message, 'error');
  }
  state.loading = false;
  renderMain();
}

// ── RENDER
function renderApp() {
  const app = document.getElementById('app');
  if (!state.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
  app.innerHTML = `
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      <div class="content" id="mainContent">${renderPage()}</div>
    </div>
    ${renderNotifPanel()}
  `;
  bindSidebar();
  bindTopbar();
  bindPage();
}

function renderMain() {
  const mc = document.getElementById('mainContent');
  if (mc) { mc.innerHTML = renderPage(); bindPage(); }
}

// ── LOGIN PAGE
function renderLogin() {
  return `
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="big">⚖️ CA Comply</div>
        <div class="sub">Compliance Management for CA Firms</div>
      </div>
      <div class="login-tabs">
        <div class="login-tab active" id="tab-login" onclick="showTab('login')">Login</div>
        <div class="login-tab" id="tab-register" onclick="showTab('register')">Register Firm</div>
      </div>
      <div id="login-form">
        <div id="login-error"></div>
        <div class="form-group">
          <label>Email Address</label>
          <input id="l-email" type="email" placeholder="ravi@raviranjan-ca.in" value="ravi@raviranjan-ca.in">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="l-pass" type="password" placeholder="••••••••" value="Demo@1234">
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" id="login-btn">Sign In →</button>
        <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:14px">Demo: ravi@raviranjan-ca.in / Demo@1234</p>
      </div>
      <div id="register-form" style="display:none">
        <div id="reg-error"></div>
        <div class="form-row">
          <div class="form-group"><label>Firm Name</label><input id="r-firm" placeholder="CA Sharma & Associates"></div>
          <div class="form-group"><label>City</label><input id="r-city" placeholder="Patna, Bihar"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Partner Name</label><input id="r-name" placeholder="CA Ravi Kumar"></div>
          <div class="form-group"><label>ICAI Membership</label><input id="r-icai" placeholder="ICAI-MRN-XXXXXX"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Email</label><input id="r-email" type="email" placeholder="partner@firm.in"></div>
          <div class="form-group"><label>Phone</label><input id="r-phone" placeholder="+91XXXXXXXXXX"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Password</label><input id="r-pass" type="password" placeholder="Min 8 chars"></div>
          <div class="form-group">
            <label>Plan</label>
            <select id="r-tier">
              <option value="silver">Silver (Free Trial)</option>
              <option value="gold">Gold</option>
              <option value="platinum">Platinum</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" id="register-btn">Register Firm →</button>
      </div>
    </div>
  </div>`;
}

function showTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').className = 'login-tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-register').className = 'login-tab' + (tab === 'register' ? ' active' : '');
}

function bindLogin() {
  document.getElementById('login-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    errEl.innerHTML = '';
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const d = await api('POST', '/auth/login', {
        email: document.getElementById('l-email').value,
        password: document.getElementById('l-pass').value
      });
      state.user = d.user; state.token = d.accessToken; state.refreshToken = d.refreshToken;
      localStorage.setItem('ca_token', d.accessToken);
      localStorage.setItem('ca_refresh', d.refreshToken);
      renderApp();
      loadPageData('dashboard');
    } catch (e) {
      errEl.innerHTML = `<div class="error-msg">${e.message}</div>`;
    }
    btn.disabled = false; btn.textContent = 'Sign In →';
  });

  document.getElementById('register-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('register-btn');
    const errEl = document.getElementById('reg-error');
    errEl.innerHTML = '';
    btn.disabled = true; btn.textContent = 'Registering...';
    try {
      const d = await api('POST', '/auth/register-firm', {
        firmName: document.getElementById('r-firm').value,
        firmCity: document.getElementById('r-city').value,
        adminName: document.getElementById('r-name').value,
        icaiMembership: document.getElementById('r-icai').value,
        adminEmail: document.getElementById('r-email').value,
        adminPhone: document.getElementById('r-phone').value,
        password: document.getElementById('r-pass').value,
        tier: document.getElementById('r-tier').value,
      });
      state.user = d.user; state.token = d.accessToken; state.refreshToken = d.refreshToken;
      localStorage.setItem('ca_token', d.accessToken);
      localStorage.setItem('ca_refresh', d.refreshToken);
      toast('Firm registered successfully! Welcome to CA Comply.', 'success');
      renderApp();
      loadPageData('dashboard');
    } catch (e) {
      errEl.innerHTML = `<div class="error-msg">${e.message}</div>`;
    }
    btn.disabled = false; btn.textContent = 'Register Firm →';
  });

  // Enter key for login
  document.getElementById('l-pass')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn')?.click();
  });
}

// ── PAGES
function renderPage() {
  if (state.loading) return `<div class="loading"><div class="spinner"></div>Loading...</div>`;
  const pages = { dashboard: renderDashboard, compliance: renderCompliance, clients: renderClients, documents: renderDocuments, users: renderUsers, bank_analysis: renderBankAnalysis, analytics: renderAnalytics, notifications: renderNotifications, settings: renderSettings };
  return (pages[state.currentPage] || renderDashboard)();
}

function bindPage() {
  if (state.currentPage === 'compliance') bindCompliance();
  if (state.currentPage === 'clients') bindClients();
  if (state.currentPage === 'documents') bindDocuments();
  if (state.currentPage === 'users') bindUsers();
  if (state.currentPage === 'bank_analysis') bindBankAnalysis();
  if (state.currentPage === 'analytics') bindAnalytics();
  if (state.currentPage === 'notifications') bindNotifications();
  if (state.currentPage === 'settings') bindSettings();
}

// ── DASHBOARD
function renderDashboard() {
  const s = state.data.stats || {};
  const upcoming = state.data.upcoming || [];
  const activity = state.data.activity || [];
  const overdue = parseInt(s.overdue) || 0;
  const dueWeek = parseInt(s.due_this_week) || 0;
  const completed = parseInt(s.completed_mtd) || 0;
  const unassigned = parseInt(s.unassigned) || 0;
  const compRate = parseFloat(s.completion_rate) || 0;

  return `
  <div class="stat-cards">
    <div class="stat-card red">
      <div class="stat-val">${overdue}</div>
      <div class="stat-label">🔴 Overdue Tasks</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-val">${dueWeek}</div>
      <div class="stat-label">⚠️ Due This Week</div>
    </div>
    <div class="stat-card green">
      <div class="stat-val">${completed}</div>
      <div class="stat-label">✅ Completed (30d)</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-val">${s.total_clients || 0}</div>
      <div class="stat-label">👥 Total Clients</div>
    </div>
    <div class="stat-card" style="border-color:rgba(139,92,246,0.3)">
      <div class="stat-val" style="color:var(--purple)">${compRate}%</div>
      <div class="stat-label">📊 Completion Rate</div>
    </div>
    <div class="stat-card" style="border-color:rgba(245,158,11,0.3)">
      <div class="stat-val" style="color:var(--yellow)">${unassigned}</div>
      <div class="stat-label">📋 Unassigned</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 380px;gap:20px">
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">⏰ Upcoming Deadlines</div>
      ${upcoming.length === 0 ? '<div class="empty"><div class="empty-icon">🎉</div>No upcoming deadlines!</div>' : `
      <div class="table-wrap">
      <table>
        <tr><th>Client</th><th>Task</th><th>Due Date</th><th>Days</th><th>Status</th><th>Assigned</th></tr>
        ${upcoming.slice(0, 15).map(t => {
          const days = parseInt(t.days_until_due);
          const statusClass = t.status === 'overdue' ? 'badge-red badge-pulse' : days <= 3 ? 'badge-red' : days <= 7 ? 'badge-yellow' : 'badge-blue';
          const daysText = days < 0 ? `${Math.abs(days)}d overdue` : days === 0 ? 'Today!' : `${days}d`;
          return `<tr>
            <td><div style="font-weight:600">${t.client_name}</div><div style="font-size:11px;color:var(--text3)">${t.client_code}</div></td>
            <td>${t.title}</td>
            <td>${new Date(t.due_date).toLocaleDateString('en-IN')}</td>
            <td><span class="badge ${statusClass}">${daysText}</span></td>
            <td><span class="badge badge-${t.status === 'overdue' ? 'red' : t.status === 'in_progress' ? 'blue' : t.status === 'done' ? 'green' : 'yellow'}">${t.status}</span></td>
            <td style="font-size:12px;color:var(--text2)">${t.assigned_to_name || '<span style="color:var(--red)">Unassigned</span>'}</td>
          </tr>`;
        }).join('')}
      </table></div>`}
    </div>
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">📋 Recent Activity</div>
      ${activity.length === 0 ? '<div class="empty">No recent activity</div>' : activity.map(a => `
        <div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start">
          <span style="font-size:18px">${a.action.includes('login') ? '🔑' : a.action.includes('task') ? '✅' : a.action.includes('client') ? '👤' : '📋'}</span>
          <div>
            <div style="font-size:12px;font-weight:600">${a.full_name || 'System'}</div>
            <div style="font-size:11px;color:var(--text2)">${a.action} ${a.metadata?.title ? '— ' + a.metadata.title : ''}</div>
            <div style="font-size:11px;color:var(--text3)">${timeAgo(a.created_at)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

// ── COMPLIANCE
let complianceFilter = 'all';
function renderCompliance() {
  const tasks = state.data.tasks || [];
  const filters = [
    { id: 'all', label: 'All' },
    { id: 'overdue', label: `🔴 Overdue (${tasks.filter(t => t.status === 'overdue').length})` },
    { id: 'due_week', label: `⚠️ Due This Week (${tasks.filter(t => ['pending','in_progress'].includes(t.status) && daysDiff(t.due_date) <= 7 && daysDiff(t.due_date) >= 0).length})` },
    { id: 'in_progress', label: 'In Progress' },
    { id: 'unassigned', label: `Unassigned (${tasks.filter(t => t.status === 'unassigned').length})` },
    { id: 'done', label: '✅ Done' },
  ];

  let filtered = tasks;
  if (complianceFilter === 'overdue') filtered = tasks.filter(t => t.status === 'overdue');
  else if (complianceFilter === 'due_week') filtered = tasks.filter(t => ['pending','in_progress'].includes(t.status) && daysDiff(t.due_date) <= 7 && daysDiff(t.due_date) >= 0);
  else if (complianceFilter === 'in_progress') filtered = tasks.filter(t => t.status === 'in_progress');
  else if (complianceFilter === 'unassigned') filtered = tasks.filter(t => t.status === 'unassigned');
  else if (complianceFilter === 'done') filtered = tasks.filter(t => t.status === 'done');

  return `
  <div class="tabs">
    ${filters.map(f => `<div class="tab${complianceFilter === f.id ? ' active' : ''}" onclick="setComplianceFilter('${f.id}')">${f.label}</div>`).join('')}
  </div>
  <div class="card" style="padding:0">
    <div class="table-wrap">
    <table>
      <tr><th>Client</th><th>Task</th><th>Type</th><th>Due Date</th><th>Priority</th><th>Assigned To</th><th>Status</th><th>Actions</th></tr>
      ${filtered.length === 0 ? `<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:32px">No tasks found</td></tr>` :
        filtered.map(t => {
          const days = daysDiff(t.due_date);
          const isOverdue = t.status === 'overdue';
          return `<tr>
            <td>
              <div style="font-weight:600">${t.client_name}</div>
              <div style="font-size:11px;color:var(--text3)">${t.client_code}</div>
            </td>
            <td style="max-width:200px">
              <div>${t.title}</div>
              ${t.financial_year ? `<div style="font-size:11px;color:var(--text3)">FY ${t.financial_year}</div>` : ''}
            </td>
            <td><span class="badge badge-blue" style="font-size:10px">${t.compliance_type.replace('_',' ').toUpperCase()}</span></td>
            <td>
              <div>${new Date(t.due_date).toLocaleDateString('en-IN')}</div>
              <div style="font-size:11px;color:${isOverdue ? 'var(--red)' : days <= 3 ? 'var(--yellow)' : 'var(--text3)'}">
                ${isOverdue ? `${Math.abs(days)}d overdue` : days === 0 ? 'Today' : `${days}d left`}
              </div>
            </td>
            <td><span class="badge badge-${t.priority === 'critical' ? 'red' : t.priority === 'high' ? 'yellow' : t.priority === 'medium' ? 'blue' : 'gray'}">${t.priority}</span></td>
            <td style="font-size:12px">${t.assigned_to_name || '<span style="color:var(--red);font-size:12px">Unassigned</span>'}</td>
            <td><span class="badge badge-${statusColor(t.status)}">${t.status.replace('_',' ')}</span></td>
            <td>
              <div style="display:flex;gap:4px">
                ${t.status !== 'done' && t.status !== 'cancelled' ? `
                  ${t.status === 'unassigned' || t.status === 'pending' ? `<button class="btn btn-sm" style="background:var(--accent-dim);color:var(--accent);border:none;cursor:pointer" onclick="updateTaskStatus('${t.id}','in_progress')">▶ Start</button>` : ''}
                  ${t.status === 'in_progress' ? `<button class="btn btn-sm" style="background:var(--green-dim);color:var(--green);border:none;cursor:pointer" onclick="updateTaskStatus('${t.id}','done')">✓ Done</button>` : ''}
                  ${['partner','manager'].includes(state.user?.role) ? `<button class="btn btn-sm btn-secondary" onclick="showAssignModal('${t.id}','${t.title}')">👤</button>` : ''}
                ` : ''}
              </div>
            </td>
          </tr>`;
        }).join('')}
    </table></div>
  </div>`;
}

function setComplianceFilter(f) { complianceFilter = f; renderMain(); }

function bindCompliance() {}

async function updateTaskStatus(taskId, status) {
  try {
    await api('PATCH', `/compliance/tasks/${taskId}/status`, { status });
    toast(`Task marked as ${status}`, 'success');
    const d = await api('GET', '/compliance/tasks?limit=200');
    if (d) state.data.tasks = d.tasks;
    const ds = await api('GET', '/dashboard/stats');
    if (ds) { state.data.stats = ds.stats; state.data.upcoming = ds.upcomingDeadlines; }
    renderMain();
  } catch (e) { toast(e.message, 'error'); }
}

function filterClients(q) {
  const rows = document.querySelectorAll('#mainContent table tr:not(:first-child)');
  rows.forEach(r => {
    r.style.display = !q || r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function bindClients() {}

async function deleteClient(id, name) {
  if (!confirm(`Delete client "${name}"?\n\nThis will soft-delete the client and cannot be undone easily.`)) return;
  try {
    await api('DELETE', `/clients/${id}`);
    toast(`${name} deleted`, 'success');
    const d = await api('GET', '/clients?limit=200');
    if (d) state.data.clients = d.clients;
    renderMain();
  } catch (e) { toast(e.message, 'error'); }
}

function formatBytes(b) {
  if (!b) return '0 B';
  const k = 1024;
  const sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(k));
  return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

// ── BANK STATEMENT ANALYSER
function formatINR(n) {
  return '₹' + Math.abs(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 2 });
}

function parseCSVRows(text) {
  const lines = text.split(/\r?\n/);
  return lines.map(line => {
    const cells = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cells.push(cur.trim());
    return cells;
  });
}

function parseDate(val) {
  if (val === null || val === undefined || val === '') return null;
  if (typeof val === 'number') {
    // Excel serial date
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    if (isNaN(d)) return null;
    return d.toISOString().slice(0, 10);
  }
  const s = String(val).trim();
  // DD/MM/YYYY or DD-MM-YYYY
  const m1 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (m1) return `${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  // YYYY-MM-DD or YYYY/MM/DD
  const m2 = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m2) return `${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
  // DD MMM YYYY (e.g. 01 Jan 2024)
  const m3 = s.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})$/);
  if (m3) {
    const months = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
    const mo = months[m3[2].toLowerCase()];
    if (mo) return `${m3[3]}-${String(mo).padStart(2,'0')}-${m3[1].padStart(2,'0')}`;
  }
  return null;
}

function parseAmount(val) {
  if (val === null || val === undefined || val === '') return 0;
  if (typeof val === 'number') return isNaN(val) ? 0 : val;
  const s = String(val).replace(/[₹,\s]/g, '').replace(/\(([^)]+)\)/, '-$1');
  if (s === '' || s === '-' || s.toLowerCase() === 'nil' || s.toLowerCase() === 'n/a') return 0;
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function detectAndNormalizeColumns(rows) {
  const headerKws = ['date','narr','particular','desc','detail','remark','transact','debit','dr','credit','cr','withdraw','deposit','amount','balance','closing','chq','cheque','ref'];
  let headerIdx = -1;
  for (let i = 0; i < Math.min(15, rows.length); i++) {
    const row = rows[i].map(c => String(c || '').trim().toLowerCase());
    const hits = row.filter(c => c.length > 0 && headerKws.some(kw => c === kw || c.startsWith(kw) || (kw.length >= 5 && c.includes(kw))));
    if (hits.length >= 2) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return [];
  const headers = rows[headerIdx].map(c => String(c || '').trim().toLowerCase());
  // Priority: 1-exact  2-starts-with  3-contains (≥5-char keywords only)
  function findCol(...kws) {
    let idx = headers.findIndex(h => kws.some(kw => h === kw));
    if (idx >= 0) return idx;
    idx = headers.findIndex(h => kws.some(kw => h.startsWith(kw)));
    if (idx >= 0) return idx;
    return headers.findIndex(h => kws.filter(kw => kw.length >= 5).some(kw => h.includes(kw)));
  }
  const dateIdx   = findCol('date','txn date','value date','trans date','transaction date');
  const descIdx   = findCol('narration','particular','description','narr','details','remark','transact');
  const debitIdx  = findCol('debit','dr','withdrawal','withdrawl','paid out','debit amount','dr amount');
  const creditIdx = findCol('credit','cr','deposit','paid in','credit amount','cr amount');
  const amtIdx    = findCol('amount','transaction amount');
  const balIdx    = findCol('balance','closing balance','available balance','running balance');

  const txns = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.every(c => !String(c || '').trim())) continue;
    const rawDate = dateIdx >= 0 ? row[dateIdx] : row[0];
    const date = parseDate(rawDate);
    if (!date) continue;
    const desc = descIdx >= 0 ? String(row[descIdx] || '').trim() : '';
    let debit = 0, credit = 0;
    if (debitIdx >= 0 && creditIdx >= 0) {
      debit  = parseAmount(row[debitIdx]);
      credit = parseAmount(row[creditIdx]);
    } else if (amtIdx >= 0) {
      const amt = parseAmount(row[amtIdx]);
      if (amt < 0) debit = Math.abs(amt); else credit = amt;
    }
    const balance = balIdx >= 0 ? parseAmount(row[balIdx]) : null;
    if (!desc && debit === 0 && credit === 0) continue;
    txns.push({ date, desc, debit, credit, balance });
  }
  return txns;
}

function categorizeTransactions(txns) {
  const rules = [
    { label:'Salary / Income',  keys:['salary','sal ','pay ','stipend','wages'],           color:'green'  },
    { label:'GST / Tax',        keys:['gst','tds','income tax','pt/','advance tax'],        color:'red'    },
    { label:'EMI / Loan',       keys:['emi','loan','mortgage','housing','car loan'],        color:'yellow' },
    { label:'Rent',             keys:['rent','lease'],                                      color:'purple' },
    { label:'Utilities',        keys:['electric','water bill','gas','internet','broadband','airtel','jio','bsnl','vi '], color:'blue' },
    { label:'Investment',       keys:['mutual fund','sip','nps','ppf','rd/','fd/','zerodha','groww','stock'], color:'green' },
    { label:'Bank Charges',     keys:['charge','fee','commission','penalty','interest','gst on charges'], color:'red' },
    { label:'Transfer',         keys:['neft','rtgs','imps','upi','trf','transfer'],         color:'blue'   },
    { label:'Cash',             keys:['cash','atm','withdrawal'],                           color:'yellow' },
  ];
  const result = {};
  rules.forEach(r => { result[r.label] = { credit:0, debit:0, count:0, color:r.color }; });
  result['Other'] = { credit:0, debit:0, count:0, color:'gray' };
  txns.forEach(t => {
    const d = t.desc.toLowerCase();
    let matched = false;
    for (const r of rules) {
      if (r.keys.some(kw => d.includes(kw))) {
        result[r.label].credit += t.credit;
        result[r.label].debit  += t.debit;
        result[r.label].count++;
        matched = true; break;
      }
    }
    if (!matched) { result['Other'].credit += t.credit; result['Other'].debit += t.debit; result['Other'].count++; }
  });
  return Object.entries(result).filter(([,v]) => v.count > 0)
    .map(([label, v]) => ({ label, ...v }))
    .sort((a,b) => (b.credit+b.debit) - (a.credit+a.debit));
}

function analyzeTransactions(txns) {
  if (!txns.length) return null;
  const totalCredit = txns.reduce((s,t) => s+t.credit, 0);
  const totalDebit  = txns.reduce((s,t) => s+t.debit,  0);
  const net = totalCredit - totalDebit;
  const dates = txns.map(t => t.date).sort();
  const monthlyMap = {};
  txns.forEach(t => {
    const k = t.date.slice(0,7);
    if (!monthlyMap[k]) monthlyMap[k] = { credit:0, debit:0 };
    monthlyMap[k].credit += t.credit;
    monthlyMap[k].debit  += t.debit;
  });
  const monthly = Object.entries(monthlyMap).sort(([a],[b]) => a.localeCompare(b))
    .map(([month, v]) => ({ month, ...v }));
  const categories = categorizeTransactions(txns);
  const topDebits  = [...txns].filter(t=>t.debit>0).sort((a,b)=>b.debit-a.debit).slice(0,5);
  const topCredits = [...txns].filter(t=>t.credit>0).sort((a,b)=>b.credit-a.credit).slice(0,5);
  return { totalCredit, totalDebit, net, fromDate: dates[0], toDate: dates[dates.length-1],
           txCount: txns.length, monthly, categories, topDebits, topCredits };
}

async function handleBankFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['csv','xlsx','xls','pdf'].includes(ext)) {
    toast('Unsupported format. Use CSV, Excel, or PDF.', 'error'); return;
  }
  state.loading = true; renderApp();
  try {
    const clientId = document.getElementById('baClientSelect')?.value || '';
    const fy       = document.getElementById('baFYInput')?.value || '';
    if (ext === 'pdf') {
      state.data.bankData = { transactions:[], analysis:null, clientId, fy, fileName:file.name, fileObj:file, pdfUrl: URL.createObjectURL(file) };
    } else {
      let rows = [];
      if (ext === 'csv') {
        const text = await file.text();
        rows = parseCSVRows(text);
      } else {
        const buf = await file.arrayBuffer();
        const wb  = XLSX.read(buf, { type:'array', cellDates:false });
        const ws  = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      }
      const txns    = detectAndNormalizeColumns(rows);
      const analysis = analyzeTransactions(txns);
      if (!txns.length) { toast('Could not detect transactions. Check the file format.','error'); state.loading=false; renderApp(); return; }
      state.data.bankData = { transactions:txns, analysis, clientId, fy, fileName:file.name, fileObj:file, pdfUrl:null };
    }
    state.data.bankSearch = ''; state.data.bankPage = 0;
  } catch(e) { toast('Parse error: ' + e.message, 'error'); }
  state.loading = false; renderApp();
}

async function saveBankStatementToVault() {
  const bd = state.data.bankData;
  if (!bd?.fileObj) return;
  if (!bd.clientId) { toast('Select a client first', 'error'); return; }
  const fd = new FormData();
  fd.append('file', bd.fileObj);
  fd.append('clientId', bd.clientId);
  fd.append('documentType', 'bank_statement');
  fd.append('financialYear', bd.fy || '');
  try {
    const res = await fetch(API + '/documents/upload', { method:'POST', headers:{ 'Authorization':'Bearer '+state.token }, body:fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Upload failed');
    toast('Saved to Document Vault', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

function renderPieChart(categories) {
  if (!categories.length) return '<div style="color:var(--text3);padding:20px;text-align:center">No data</div>';
  const colorMap = { green:'#10b981', red:'#ef4444', yellow:'#f59e0b', purple:'#8b5cf6', blue:'#3b82f6', gray:'#64748b' };
  const total = categories.reduce((s, c) => s + c.credit + c.debit, 0);
  if (total === 0) return '<div style="color:var(--text3);padding:20px;text-align:center">No data</div>';
  const R = 70, cx = 90, cy = 90;
  let slices = '', angle = -Math.PI / 2;
  categories.forEach(c => {
    const val = c.credit + c.debit;
    const frac = val / total;
    const sweep = frac * 2 * Math.PI;
    const x1 = cx + R * Math.cos(angle);
    const y1 = cy + R * Math.sin(angle);
    angle += sweep;
    const x2 = cx + R * Math.cos(angle);
    const y2 = cy + R * Math.sin(angle);
    const large = sweep > Math.PI ? 1 : 0;
    const color = colorMap[c.color] || '#64748b';
    slices += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${color}" opacity="0.85" stroke="var(--surface)" stroke-width="1.5">
      <title>${c.label}: ${formatINR(val)} (${(frac*100).toFixed(1)}%)</title></path>`;
  });
  const legend = categories.map(c => {
    const pct = (((c.credit + c.debit) / total) * 100).toFixed(1);
    return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:5px">
      <div style="width:10px;height:10px;border-radius:2px;background:${colorMap[c.color]||'#64748b'};flex-shrink:0"></div>
      <span style="color:var(--text2);flex:1">${c.label}</span>
      <span style="color:var(--text3)">${pct}%</span>
    </div>`;
  }).join('');
  return `<div style="display:flex;align-items:center;gap:16px;padding:12px 16px">
    <svg width="180" height="180" viewBox="0 0 180 180">${slices}</svg>
    <div style="flex:1">${legend}</div>
  </div>`;
}

function updateBankTable(searchVal) {
  const bd = state.data.bankData;
  if (!bd) return;
  // Apply 3-char minimum
  if (searchVal !== undefined) {
    if (searchVal.length > 0 && searchVal.length < 3) return; // wait for 3 chars
    state.data.bankSearch = searchVal;
    state.data.bankPage = 0;
  }
  const search = (state.data.bankSearch || '').toLowerCase();
  const PAGE_SIZE = 25;
  const filtered = bd.transactions.filter(t =>
    t.desc.toLowerCase().includes(search) ||
    t.date.includes(search) ||
    String(t.debit).includes(search) ||
    String(t.credit).includes(search)
  );
  const page  = state.data.bankPage || 0;
  const total = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  const paged = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  const body = document.getElementById('baTxBody');
  if (body) {
    body.innerHTML = paged.length ? paged.map(t => `<tr>
      <td style="font-size:12px;white-space:nowrap">${t.date}</td>
      <td style="font-size:12px;max-width:340px">${t.desc||'—'}</td>
      <td style="font-size:12px;text-align:right;color:${t.debit>0?'var(--red)':'var(--text3)'}">${t.debit>0?formatINR(t.debit):'—'}</td>
      <td style="font-size:12px;text-align:right;color:${t.credit>0?'var(--green)':'var(--text3)'}">${t.credit>0?formatINR(t.credit):'—'}</td>
      <td style="font-size:12px;text-align:right;color:var(--text2)">${t.balance!=null?formatINR(t.balance):'—'}</td>
    </tr>`).join('') : `<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text3)">No transactions match your search.</td></tr>`;
  }
  const txCount = document.getElementById('baTxCount');
  if (txCount) txCount.textContent = `(${filtered.length})`;
  const pageInfo = document.getElementById('baPageInfo');
  if (pageInfo) pageInfo.textContent = `Page ${page + 1} of ${total}`;
  const prev = document.getElementById('baPrev');
  if (prev) prev.disabled = page === 0;
  const next = document.getElementById('baNext');
  if (next) next.disabled = page >= total - 1;
}

function buildBankContext() {
  const bd = state.data.bankData;
  if (!bd || !bd.analysis) return '';
  const a = bd.analysis;
  const clients = state.data.clients || [];
  const clientName = clients.find(c => c.id === bd.clientId)?.full_name || 'Unknown';
  let ctx = `File: ${bd.fileName}\nClient: ${clientName}\nPeriod: ${a.fromDate} to ${a.toDate}\n`;
  ctx += `Total Credits: ${formatINR(a.totalCredit)}\nTotal Debits: ${formatINR(a.totalDebit)}\nNet: ${formatINR(a.net)}\nTransactions: ${a.txCount}\n\n`;
  ctx += `Monthly Summary:\n`;
  a.monthly.forEach(m => { ctx += `  ${m.month}: Credits ${formatINR(m.credit)}, Debits ${formatINR(m.debit)}\n`; });
  ctx += `\nCategory Breakdown:\n`;
  a.categories.forEach(c => { ctx += `  ${c.label}: Credits ${formatINR(c.credit)}, Debits ${formatINR(c.debit)}, Count ${c.count}\n`; });
  ctx += `\nTop 10 Transactions (by amount):\n`;
  const top10 = [...bd.transactions].sort((a,b) => (b.debit+b.credit) - (a.debit+a.credit)).slice(0, 10);
  top10.forEach(t => { ctx += `  ${t.date} | ${t.desc} | Dr: ${t.debit > 0 ? formatINR(t.debit) : '-'} | Cr: ${t.credit > 0 ? formatINR(t.credit) : '-'}\n`; });
  return ctx;
}

async function sendBankChat() {
  const input = document.getElementById('bankChatInput');
  const msgs  = document.getElementById('bankChatMsgs');
  if (!input || !msgs) return;
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  // User bubble
  msgs.innerHTML += `<div style="align-self:flex-end;background:var(--accent);color:#fff;padding:8px 12px;border-radius:10px 10px 2px 10px;font-size:12px;max-width:85%">${message}</div>`;
  // Typing indicator
  const typingId = 'bcTyping_' + Date.now();
  msgs.innerHTML += `<div id="${typingId}" style="align-self:flex-start;color:var(--text3);font-size:12px;padding:6px 12px">⏳ Thinking...</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  try {
    const context = buildBankContext();
    const d = await api('POST', '/bank-analysis/chat', { message, context });
    document.getElementById(typingId)?.remove();
    if (d && d.reply) {
      msgs.innerHTML += `<div style="align-self:flex-start;background:var(--surface2);padding:8px 12px;border-radius:10px 10px 10px 2px;font-size:12px;max-width:90%;white-space:pre-wrap;line-height:1.5">${d.reply}</div>`;
    }
  } catch(e) {
    document.getElementById(typingId)?.remove();
    msgs.innerHTML += `<div style="align-self:flex-start;color:var(--red);font-size:12px;padding:6px 12px">${e.message}</div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
}

          <div class="form-group"><label>State</label><input id="c-state" placeholder="Bihar"></div>
        </div>
        <div class="form-group"><label>Assign Manager</label>
          <select id="c-manager"><option value="">No preference</option>${users.filter(u => ['partner','manager'].includes(u.role)).map(u => `<option value="${u.id}">${u.full_name}</option>`).join('')}</select></div>
        <div style="display:flex;gap:20px;margin-top:8px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="c-itr" checked> ITR</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="c-gst2"> GST</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="c-tds"> TDS</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="c-advtax"> Advance Tax</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" id="saveClientBtn">Add Client</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.getElementById('saveClientBtn').addEventListener('click', async () => {
    const btn = document.getElementById('saveClientBtn');
    const err = document.getElementById('client-modal-err');
    const name = document.getElementById('c-name').value.trim();
    if (!name) { err.innerHTML = '<div class="error-msg">Client name is required</div>'; return; }
    btn.disabled = true; btn.textContent = 'Adding...';
    try {
      await api('POST', '/clients', {
        fullName: name, clientType: document.getElementById('c-type').value,
        email: document.getElementById('c-email').value, phone: document.getElementById('c-phone').value,
        panNumber: document.getElementById('c-pan').value.toUpperCase(), gstNumber: document.getElementById('c-gst').value.toUpperCase(),
        city: document.getElementById('c-city').value, state: document.getElementById('c-state').value,
        assignedManagerId: document.getElementById('c-manager').value || undefined,
        itrApplicable: document.getElementById('c-itr').checked,
        gstApplicable: document.getElementById('c-gst2').checked,
        tdsApplicable: document.getElementById('c-tds').checked,
        advanceTaxApplicable: document.getElementById('c-advtax').checked,
      });
      overlay.remove();
      toast('Client added!', 'success');
      const d = await api('GET', '/clients?limit=200');
      if (d) state.data.clients = d.clients;
      renderMain();
    } catch (e) { err.innerHTML = `<div class="error-msg">${e.message}</div>`; btn.disabled = false; btn.textContent = 'Add Client'; }
  });
}

// ── UTILS
function timeAgo(date) {
  if (!date) return '';
  const secs = Math.floor((Date.now() - new Date(date)) / 1000);
  if (secs < 60) return 'Just now';
  if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  return `${Math.floor(secs/86400)}d ago`;
}

function daysDiff(date) {
  return Math.ceil((new Date(date) - new Date().setHours(0,0,0,0)) / 86400000);
}

function formatBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function statusColor(s) {
  const m = { overdue:'red', done:'green', in_progress:'blue', pending:'yellow', unassigned:'gray', review:'purple', cancelled:'gray' };
  return m[s] || 'gray';
}

// ── INIT
(async function init() {
  const savedToken = localStorage.getItem('ca_token');
  const savedRefresh = localStorage.getItem('ca_refresh');
  if (savedToken) {
    state.token = savedToken;
    state.refreshToken = savedRefresh;
    try {
      const d = await api('GET', '/auth/me');
      if (d && d.user) {
        state.user = d.user;
        applyTheme(state.user.preferences?.theme || 'dark');
      }
    } catch (e) { localStorage.removeItem('ca_token'); localStorage.removeItem('ca_refresh'); }
  }
  renderApp();
  if (state.user) loadPageData('dashboard');
})();
</script>
